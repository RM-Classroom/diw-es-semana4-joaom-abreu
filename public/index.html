<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Acervo Biblioteca">
    <meta name="author" content="João Abreu">
    <link rel="stylesheet" href="style.css">
    <title>Acervo</title>
</head>
<body>

    <header>
        <div class="logo">Biblioteca</div>
        <form class="busca">
            <input type="text" placeholder="Busca de livros ou autores">
        </form>
        <a href="#" class="link-login">Login</a>
    </header>

    <div class="faixa-azul">
        <h1>Nosso acervo de autores</h1>
    </div>

    <main class="container">
        <h2 class="titulo-secao">Autores Cadastrados</h2>

        <div class="lista-autores">
            
            <article class="cartao-autor">
                <figure>
                    <img src="Images\dumas.jpg" class="foto-autor">
                    <figcaption>Alexandre Dumas</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/kant.jpg" class="foto-autor">
                    <figcaption>Immanuel Kant</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/kdick.jpg" class="foto-autor">
                    <figcaption>Philip K. Dick</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/lispector.jpg" class="foto-autor">
                    <figcaption>Clarice Lispector</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/machado.jpg" class="foto-autor">
                    <figcaption>Machado de Assis</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/nietzsche.jpg" class="foto-autor">
                    <figcaption>Friedrich Nietzsche</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/orwell.jpg" class="foto-autor">
                    <figcaption>George Orwell</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

            <article class="cartao-autor">
                <figure>
                    <img src="Images/tolkien.jpg" class="foto-autor">
                    <figcaption>J. R. R. Tolkien</figcaption>
                </figure>
                <button class="botao-obras">Ver Obras</button>
            </article>

        </div>
    </main>

</body>
</html>
